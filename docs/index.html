<!DOCTYPE html>
<html>
<head>
    <title>Mosser Watch</title>
</head>
<body>
    <h1>Mosser Watch</h1>

    <p>
        Mosser Watch sends alerts when new eBay listings matching Mosser Glass Cat searches are found.
    </p>

    <h2>Join SMS Alerts</h2>

    <form>
        <label for="phone">Mobile phone number</label><br>
        <input id="phone" name="phone" type="tel" placeholder="+1 719 555 1234">
        <br><br>

        <label>
            <input type="checkbox" required>
            I agree to receive SMS alerts from Mosser Watch when new matching eBay listings are found.
            Message frequency varies. Message and data rates may apply. Reply STOP to unsubscribe.
            Reply HELP for help.
        </label>

        <br><br>

        <button type="button">Join Alert List</button>
    </form>

    <p>
        By signing up, you agree to the
        <a href="terms.html">Terms & Conditions</a>
        and acknowledge the
        <a href="privacy.html">Privacy Policy</a>.
    </p>

    <p>
        This form is used to demonstrate the Mosser Watch SMS opt-in flow.
    </p>
</body>
</html>
